<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - ファイル共有サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">📁</span>
                <span class="logo-text">File<span class="highlight">Share</span></span>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link active">ホーム</a>
                <a href="upload.html" class="nav-link">アップロード</a>
                <a href="help.html" class="nav-link">ヘルプ</a>
            </nav>
        </header>

        <!-- Upload Section -->
        <section class="upload-section">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">☁️</div>
                <h2>ファイルをアップロード</h2>
                <p>ファイルをドラッグ＆ドロップ、またはクリックして選択</p>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    ファイルを選択
                </button>
                <input type="file" id="fileInput" multiple hidden>
                
                <!-- Progress Bar -->
                <div class="progress-wrapper" id="progressWrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p class="progress-text" id="progressText">アップロード中...</p>
                </div>
            </div>
        </section>

        <!-- Files Section -->
        <section class="files-section">
            <div class="section-header">
                <h2>📂 共有ファイル</h2>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid">▦ グリッド</button>
                    <button class="view-btn" data-view="list">☰ リスト</button>
                </div>
            </div>

            <!-- Grid View -->
            <div class="files-grid" id="filesGrid">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📭</div>
                    <p>まだファイルがありません</p>
                    <span>上のエリアからファイルをアップロードしてください</span>
                </div>
            </div>

            <!-- List View -->
            <div class="files-list" id="filesList"></div>
        </section>
    </div>

    <!-- Share Modal -->
    <div class="modal" id="shareModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔗 共有リンク</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <input type="text" class="share-input" id="shareLink" readonly>
            <div class="modal-actions">
                <button class="action-btn copy" onclick="copyLink()">📋 コピー</button>
                <button class="action-btn cancel" onclick="closeModal()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
